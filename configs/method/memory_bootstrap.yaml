method:
  name: general-writer-adaptable-reader-bootstrap
  embed_dim: 64
  writer:
    arch: mlp
    memory_slots: 8
    hidden_dim: 128
    num_heads: 4
    transformer_layers: 1
    dropout: 0.0
  reader:
    num_queries: 4
    gating_mode: off
    conditioning_mode: add
    attention_mode: standard
    gated_add_scale: 0.1
    query_residual_scale: 1.0
    num_heads: 4
    condition_on_context: true
    dropout: 0.0
    conditioning:
      domain_key: domain
      include_task_name: true
  fuser:
    arch: resampler
    short_slots: 2
    hidden_dim: 128
    num_heads: 4
    dropout: 0.0
  injector:
    mode: prefix
    enabled: true
    position: segment
  segmenter:
    mode: delimiter
    delimiter: "||"
