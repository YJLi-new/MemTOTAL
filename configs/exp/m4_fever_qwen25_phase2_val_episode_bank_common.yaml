includes:
  - ../tasks/benchmarks/pilots/fever_screen_val_m46_canonical.yaml
  - ../method/memory_bootstrap_transformer_real.yaml

experiment:
  name: m4_fever_qwen25_phase2_val_episode_bank_common
  stage: M4-shared-injection
  method_variant: fever-phase2-val-episode-bank-common

backbone:
  name: Qwen2.5-1.5B-Instruct
  model_id: /root/autodl-tmp/models/Qwen2.5-1.5B-Instruct
  load_mode: hf_causal_lm
  dtype: bfloat16
  cache_dir: /root/autodl-tmp/hf-cache
  attn_implementation: eager

task:
  train_support_episode_bank_path: data/benchmarks/pilots/fever/m46-train-triad-episode-bank32.json

runtime:
  training_stage: shared_injection_pilot
  shared_injection_arm: base_only
  writer_memory_control: real
  pilot_arm_alias: A
  pilot_prompt_variant: answer_slot_labels
  pilot_support_serialization: triad_curated6
  pilot_support_examples: 0
  pilot_injection_mode: sparse_deep_prefix
  pilot_train_support_mode: episode_bank
  pilot_train_support_mask_count: 5
  pilot_deep_prefix_layers:
    - 0
    - 7
    - 14
    - 21
    - 27
  pilot_deep_prefix_rank: 16
  pilot_train_steps: 96
  pilot_writer_learning_rate: 0.0002
  pilot_projector_learning_rate: 0.001
  pilot_writer_weight_decay: 0.0001
  pilot_projector_weight_decay: 0.0001
  pilot_projector_warmup_steps: 8
  pilot_gradient_clip_norm: 1.0
  pilot_prefix_slot_max_norm: 48.0
  pilot_prefix_total_max_norm: 192.0
  pilot_snapshot_steps:
    - 0
    - 4
    - 8
    - 16
    - 32
    - 48
    - 64
    - 80
    - 96
  stage_c_choice_margin: 0.1
  device: cuda
