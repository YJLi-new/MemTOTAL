task:
  name: fever_real_screen_val
  benchmark_id: fever
  domain: qa
  split: eval
  smoke_subset: real_screen_val
  pilot_split: screen_val
  dataset_path: data/benchmarks/pilots/fever/screen-val.jsonl
  train_dataset_path: data/benchmarks/pilots/fever/screen-train.jsonl
  support_dataset_path: data/benchmarks/pilots/fever/pilot-support8.jsonl
  metric_name: accuracy
  evaluator:
    type: multiple_choice
_meta:
  config_path: /root/mydir/MemTOTAL/configs/exp/m4_fever_qwen25_support_bank_prep.yaml
  includes:
  - /root/mydir/MemTOTAL/configs/tasks/benchmarks/pilots/fever_screen_val.yaml
  - /root/mydir/MemTOTAL/configs/method/memory_bootstrap_transformer_real.yaml
method:
  name: general-writer-adaptable-reader-transformer-bootstrap
  embed_dim: auto
  writer:
    arch: transformer
    memory_slots: 8
    hidden_dim: null
    num_heads: 4
    transformer_layers: 2
    dropout: 0.0
  reader:
    num_queries: 4
    gating_mode: false
    query_residual_scale: 1.0
    num_heads: 4
    condition_on_context: true
    dropout: 0.0
    conditioning:
      domain_key: domain
      include_task_name: true
  fuser:
    arch: resampler
    short_slots: 2
    hidden_dim: null
    num_heads: 4
    dropout: 0.0
  injector:
    mode: prefix
    enabled: true
    position: segment
  segmenter:
    mode: delimiter
    delimiter: '||'
experiment:
  name: m4_fever_qwen25_support_bank_prep
  stage: M4-shared-injection
  method_variant: fever-support-bank-prep
backbone:
  name: Qwen2.5-1.5B-Instruct
  model_id: /root/autodl-tmp/models/Qwen2.5-1.5B-Instruct
  load_mode: hf_causal_lm
  dtype: bfloat16
  cache_dir: /root/autodl-tmp/hf-cache
runtime:
  analysis_mode: m4_prepare_fever_support_banks
  support_bank_output_root: data/benchmarks/pilots/fever
  support_bank_episode_count: 32
  device: cuda
